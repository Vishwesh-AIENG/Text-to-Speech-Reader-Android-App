<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="OmniLingo — open-source assistive language companion for Android. OCR reader, live conversation, dyslexia focus, AR overlay, e-reader and model manager — all on-device, zero cloud." />
<meta name="theme-color" content="#05111c" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />

<!-- Open Graph -->
<meta property="og:title" content="OmniLingo — Assistive Language Companion" />
<meta property="og:description" content="Point. Read. Speak any language, anywhere. Six on-device modes. Zero cloud calls." />
<meta property="og:type" content="website" />

<title>OmniLingo — Your All-in-One Assistive Language Companion</title>

<!-- DNS prefetch + preconnect for all external origins -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link rel="dns-prefetch" href="https://unpkg.com" />
<link rel="dns-prefetch" href="https://esm.sh" />

<!-- Fonts: only the weights actually used, swap to avoid FOIT -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;600&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink-0:#05111c;
    --ink-1:#081826;
    --ink-2:#0b2437;
    --ink-3:#0f3247;
    --fog: #8fb9cc;
    --mist:#cde4ee;
    --paper:#eaf4f8;
    --teal-1:#1a6b96;
    --teal-2:#2d9cdb;
    --cyan:  #5fd7ff;
    --ice:   #9ef0ff;
    --aurora:#7cf5d4;
    --rose:  #ff8bb3;
    --amber: #ffc872;
    --grid:  rgba(143,185,204,0.08);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#05111c;color:var(--paper);
    font-family:'Space Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  body{min-height:100vh}
  .mono{font-family:'JetBrains Mono',monospace}
  .serif{font-family:'Fraunces',serif; font-style:italic; font-weight:300}

  /* ===== Page lattice — sits above the fixed 3D canvas ===== */
  #page{position:relative; z-index:2}
  #bg3d{position:fixed; inset:0; z-index:0; pointer-events:auto}
  #grain{position:fixed; inset:0; z-index:1; pointer-events:none; mix-blend-mode:overlay; opacity:.35;
    background-image:
      radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,.08) 50%, transparent 51%),
      radial-gradient(1px 1px at 80px 120px, rgba(255,255,255,.06) 50%, transparent 51%),
      radial-gradient(1px 1px at 140px 70px, rgba(255,255,255,.09) 50%, transparent 51%);
    background-size: 180px 180px;
  }

  /* ===== Top bar ===== */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:20;
    padding:18px 28px; display:flex; align-items:center; justify-content:space-between;
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    background:linear-gradient(180deg,rgba(5,17,28,.55),rgba(5,17,28,.15) 70%, transparent);
    border-bottom:1px solid rgba(143,185,204,.08);
  }
  .brand{display:flex; align-items:center; gap:12px; letter-spacing:.01em}
  .brand-mark{width:34px; height:34px; position:relative}
  .brand-mark svg{width:100%; height:100%}
  .brand-name{font-weight:600; font-size:18px; letter-spacing:.02em}
  .brand-name span{color:var(--cyan)}
  .nav{display:flex; gap:28px; font-size:13px; color:var(--mist)}
  .nav a{color:inherit; text-decoration:none; opacity:.75; transition:opacity .2s}
  .nav a:hover{opacity:1}
  .cta{
    background:linear-gradient(135deg, rgba(45,156,219,.18), rgba(95,215,255,.08));
    border:1px solid rgba(95,215,255,.35);
    color:var(--ice); padding:9px 18px; border-radius:999px; font-size:13px;
    font-family:'JetBrains Mono',monospace; letter-spacing:.02em;
    cursor:pointer; transition:all .2s;
    text-decoration:none; display:inline-flex; align-items:center;
  }
  .cta:hover{border-color:var(--cyan); box-shadow:0 0 0 4px rgba(95,215,255,.12)}

  /* anchor reset for btn-primary / btn-ghost used as links */
  a.btn-primary, a.btn-ghost{
    text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
  }

  /* ===== Hero ===== */
  .hero{
    min-height:100vh; position:relative;
    display:grid; grid-template-columns: 1.1fr .9fr;
    gap:40px; padding:140px 64px 80px; align-items:center;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--cyan);
    padding:6px 14px; border-radius:999px;
    border:1px solid rgba(95,215,255,.25);
    background:rgba(95,215,255,.04);
    letter-spacing:.12em; text-transform:uppercase;
  }
  .eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--aurora);
    box-shadow:0 0 12px var(--aurora); animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  h1.display{
    font-family:'Space Grotesk',sans-serif; font-weight:300;
    font-size: clamp(48px, 6.4vw, 104px); line-height:.96; letter-spacing:-0.03em;
    margin:22px 0 0; color:var(--paper);
  }
  h1.display em{
    font-family:'Fraunces',serif; font-style:italic; font-weight:300;
    background:linear-gradient(135deg,var(--ice),var(--aurora) 60%, var(--teal-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .lede{
    max-width:560px; margin:28px 0 36px; font-size:17px; line-height:1.55;
    color: #b5d0dd;
  }
  .hero-ctas{display:flex; gap:14px; align-items:center}
  .btn-primary{
    padding:14px 24px; border-radius:999px;
    background:linear-gradient(135deg,#2d9cdb,#5fd7ff);
    color:#05111c; font-weight:600; letter-spacing:.01em; border:0; cursor:pointer;
    box-shadow:0 10px 40px -10px rgba(95,215,255,.6), 0 0 0 1px rgba(255,255,255,.2) inset;
    transition:transform .2s;
  }
  .btn-primary:hover{transform:translateY(-1px)}
  .btn-ghost{
    padding:14px 22px; border-radius:999px; background:transparent;
    color:var(--mist); border:1px solid rgba(143,185,204,.25); cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:13px;
  }

  /* hero stats strip */
  .hero-stats{
    margin-top:56px; display:flex; gap:42px; flex-wrap:wrap;
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--fog);
  }
  .hero-stats b{display:block; font-size:24px; color:var(--ice); font-weight:500; letter-spacing:-.01em; margin-bottom:4px}

  /* hero right column — floating phone  */
  .phone-wrap{position:relative; display:flex; justify-content:center; align-items:center; min-height:600px}
  .phone{
    width:300px; height:620px; border-radius:44px; position:relative;
    background:linear-gradient(180deg, rgba(10,30,48,.85), rgba(5,17,28,.95));
    border:1px solid rgba(95,215,255,.22);
    box-shadow:
      0 40px 100px -20px rgba(0,0,0,.7),
      0 0 0 10px rgba(10,30,48,.6),
      0 0 60px -10px rgba(95,215,255,.25),
      inset 0 1px 0 rgba(255,255,255,.08);
    overflow:hidden;
    transform: perspective(1600px) rotateY(-14deg) rotateX(6deg);
    animation: phoneFloat 8s ease-in-out infinite;
  }
  @keyframes phoneFloat{
    0%,100%{transform: perspective(1600px) rotateY(-14deg) rotateX(6deg) translateY(0)}
    50%{transform: perspective(1600px) rotateY(-12deg) rotateX(5deg) translateY(-14px)}
  }
  .notch{position:absolute; top:10px; left:50%; transform:translateX(-50%);
    width:100px; height:26px; background:#02080e; border-radius:0 0 14px 14px; z-index:5}
  .phone-screen{position:absolute; inset:8px; border-radius:36px; overflow:hidden;
    background: radial-gradient(120% 80% at 20% 0%, rgba(45,156,219,.18), transparent 60%),
                radial-gradient(100% 100% at 80% 100%, rgba(124,245,212,.08), transparent 60%),
                #061420;
  }

  /* section structure */
  section.pad{padding:120px 64px; position:relative}
  .kicker{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.24em;
    color:var(--cyan); text-transform:uppercase; margin-bottom:16px;
    display:flex; align-items:center; gap:12px;
  }
  .kicker::before{content:""; width:32px; height:1px; background:var(--cyan); opacity:.6}
  h2.section-h{
    font-family:'Space Grotesk',sans-serif; font-weight:300;
    font-size:clamp(36px,4.4vw,68px); line-height:1.02; letter-spacing:-.02em;
    margin:0 0 20px; max-width:900px;
  }
  h2.section-h em{font-family:'Fraunces',serif; font-style:italic; color:var(--aurora)}
  .section-sub{color:#95b4c3; max-width:620px; font-size:16px; line-height:1.55}

  /* ===== Pipeline strip ===== */
  .pipeline{
    margin-top:60px; display:grid; grid-template-columns: repeat(4, 1fr);
    gap:1px; background:rgba(143,185,204,.12);
    border:1px solid rgba(143,185,204,.12);
    border-radius:18px; overflow:hidden;
  }
  .pipeline .step{
    padding:28px 24px; background:rgba(8,24,38,.65);
    backdrop-filter:blur(14px); display:flex; flex-direction:column; gap:10px;
  }
  .pipeline .step .ico{font-size:26px}
  .pipeline .step .lbl{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--cyan); letter-spacing:.2em; text-transform:uppercase}
  .pipeline .step .ttl{font-size:18px; font-weight:500}
  .pipeline .step .desc{font-size:13px; color:var(--fog); line-height:1.5}

  /* ===== Features grid ===== */
  .feat-grid{display:grid; gap:32px; margin-top:60px}
  .feat{
    display:grid; grid-template-columns: 1fr 1fr; gap:60px; align-items:center;
    padding:48px; border-radius:28px;
    background:linear-gradient(160deg, rgba(10,30,48,.55), rgba(5,17,28,.35));
    border:1px solid rgba(143,185,204,.10);
    backdrop-filter:blur(18px) saturate(130%);
    -webkit-backdrop-filter:blur(18px) saturate(130%);
    position:relative; overflow:hidden;
  }
  .feat::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(60% 80% at var(--mx,50%) var(--my,0%), rgba(95,215,255,.08), transparent 60%);
    transition:background .2s;
  }
  .feat.reverse{grid-template-columns: 1fr 1fr}
  .feat.reverse .feat-body{order:2}
  .feat.reverse .feat-demo{order:1}
  .feat-num{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--cyan);
    letter-spacing:.24em; text-transform:uppercase;
  }
  .feat h3{font-family:'Space Grotesk'; font-weight:400; font-size:38px; line-height:1.05;
    letter-spacing:-.02em; margin:14px 0 16px}
  .feat h3 em{font-family:'Fraunces'; font-style:italic; font-weight:300; color:var(--aurora)}
  .feat p{color:#a6c3d2; line-height:1.6; font-size:15px; margin:0 0 22px; max-width:520px}
  .feat-tags{display:flex; flex-wrap:wrap; gap:8px}
  .tag{
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:5px 11px;
    border-radius:999px; border:1px solid rgba(143,185,204,.2);
    color:var(--mist); background:rgba(143,185,204,.04);
  }
  .feat-demo{min-height:380px; position:relative; display:flex; align-items:center; justify-content:center}

  /* mini phone frame for demos */
  .mini-phone{
    width:100%; max-width:320px; aspect-ratio: 9/18;
    border-radius:36px; background:#030b13; border:1px solid rgba(95,215,255,.18);
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.6), 0 0 0 8px rgba(10,30,48,.5);
    padding:10px; position:relative; overflow:hidden;
  }
  .mini-phone .screen{
    width:100%; height:100%; border-radius:26px; overflow:hidden; overflow-x:hidden; position:relative;
    background: radial-gradient(140% 80% at 30% 0%, rgba(45,156,219,.14), transparent 50%),
                radial-gradient(120% 80% at 70% 100%, rgba(124,245,212,.06), transparent 50%),
                #051320;
  }

  /* ===== Language globe section ===== */
  .globe-sec{display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center}
  #globe-canvas{width:100%; aspect-ratio:1; min-height:480px}

  /* ===== Footer ===== */
  footer{
    padding:80px 64px 40px;
    border-top:1px solid rgba(143,185,204,.1);
    background:linear-gradient(180deg, transparent, rgba(5,17,28,.6));
  }
  .footer-grid{display:grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap:40px; margin-bottom:60px}
  .foot-col h5{font-family:'JetBrains Mono'; font-size:11px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--cyan); margin:0 0 16px; font-weight:500}
  .foot-col a{display:block; color:var(--fog); text-decoration:none; margin-bottom:10px;
    font-size:14px; transition:color .2s}
  .foot-col a:hover{color:var(--ice)}
  .copyright{
    display:flex; justify-content:space-between; align-items:center;
    padding-top:30px; border-top:1px solid rgba(143,185,204,.08);
    font-family:'JetBrains Mono'; font-size:12px; color:var(--fog);
  }

  /* ===== Responsive ===== */
  @media (max-width:1024px){
    .hero{grid-template-columns:1fr; padding:120px 32px 60px}
    .phone-wrap{min-height:480px}
    section.pad{padding:80px 32px}
    .feat{grid-template-columns:1fr; gap:32px; padding:32px}
    .feat.reverse .feat-body{order:1}
    .feat.reverse .feat-demo{order:2}
    .globe-sec{grid-template-columns:1fr}
    .pipeline{grid-template-columns:repeat(2,1fr)}
    .footer-grid{grid-template-columns:1fr 1fr}
    footer{padding:60px 32px 30px}
  }

  /* custom selection */
  ::selection{background:var(--cyan); color:#051320}

  /* ===== Performance: content-visibility for off-screen sections ===== */
  section.pad{content-visibility:auto; contain-intrinsic-size:0 800px}
  footer{content-visibility:auto; contain-intrinsic-size:0 400px}

  /* GPU-hint the animated elements */
  .phone{will-change:transform}
  #bg3d canvas{will-change:transform}
  .feat::before{will-change:background}

  /* Reduce paint on topbar blur — promote to own layer */
  .topbar{will-change:backdrop-filter; transform:translateZ(0)}

  /* Smooth scroll for anchor links */
  html{scroll-behavior:smooth}
</style>
</head>
<body>

<div id="bg3d"></div>
<div id="grain"></div>
<div id="page"></div>
